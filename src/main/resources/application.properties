spring.application.name=indexer
server.port=${PORT:8086}

# --- Auto-index on startup (optional) ---
# Set these and the app indexes a repo on boot automatically -- no CLI
# command, no pasting a URL into the form. Reachable afterwards at
# /jobs/startup, and linked from the landing page.
#
# llm-index.startup.enabled=true
#
# Option A: a local directory already on disk (e.g. a mounted volume)
# llm-index.startup.path=/path/to/your/repo
#
# Option B: a git URL instead -- cloned on first boot, pulled on later restarts
# llm-index.startup.repo-url=https://github.com/owner/repo.git
# llm-index.startup.work-dir=/data/llm-index-clone
#
# llm-index.startup.full=false
# llm-index.startup.reindex-on-restart=true
#
# Also write .llm-index/graph.html (same as `indexer visualize`) after each run,
# so the graph is a static file you can open directly -- not just the Graph tab
# at /jobs/startup.
# llm-index.startup.graph-visualization-enabled=true
